{% extends 'dashboard/base.html' %}

{% block title %}Upload Product - Admin Panel{% endblock %}
{% block header %}Upload New Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Premium T-Shirt Mockup" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="thumbnail" class="form-label">Thumbnail Image</label>
                            <input type="file" class="form-control" id="thumbnail" name="thumbnail" accept="image/*" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="Enter product details..." required></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="psd_files" class="form-label">PSD Files (Select one or many)</label>
                        <div class="upload-area border border-dashed rounded p-4 text-center bg-light">
                            <input type="file" class="form-control" id="psd_files" name="psd_files" multiple required>
                            <div class="mt-2 text-muted small">You can upload multiple .psd files at once using the file selector.</div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Upload Product</button>
                        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .upload-area {
        border: 2px dashed #dee2e6 !important;
        transition: border-color 0.2s;
    }
    .upload-area:hover {
        border-color: #0d6efd !important;
    }
</style>
{% endblock %}
