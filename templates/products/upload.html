{% extends 'dashboard/base.html' %}

{% block title %}Upload Product - Admin Panel{% endblock %}
{% block header %}Upload New Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" name="name"
                                placeholder="e.g. Premium T-Shirt Mockup" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="thumbnail" class="form-label">Thumbnail Image</label>
                            <input type="file" class="form-control" id="thumbnail" name="thumbnail" accept="image/*"
                                required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4"
                            placeholder="Enter product details..." required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label d-flex justify-content-between align-items-center">
                            PSD Files
                            <button type="button" class="btn btn-sm btn-outline-primary" id="add-psd-btn">+ Add Another
                                PSD</button>
                        </label>
                        <div id="psd-slots-container">
                            <!-- Slots will be added here -->
                        </div>
                    </div>

                    <!-- Hidden input to store processed JSON data -->
                    <input type="hidden" name="psd_data" id="psd_data">

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-5" id="submit-btn">Upload Product</button>
                        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ag-psd library -->
<script src="https://cdn.jsdelivr.net/npm/ag-psd/dist/bundle.js"></script>

<script>
    const psdSlotsContainer = document.getElementById('psd-slots-container');
    const addPsdBtn = document.getElementById('add-psd-btn');
    const psdDataInput = document.getElementById('psd_data');
    const submitBtn = document.getElementById('submit-btn');

    // Store structures in an object keyed by slot ID
    const psdStructures = {};

    function createPsdSlot() {
        const slotId = 'slot-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        const slot = document.createElement('div');
        slot.className = 'psd-slot card mb-3 border-dashed';
        slot.id = slotId;
        slot.innerHTML = `
            <div class="card-body p-3">
                <div class="d-flex align-items-start gap-3">
                    <div class="flex-grow-1">
                        <input type="file" class="form-control mb-1 psd-file-input" name="psd_files" accept=".psd" required>
                        <div class="small text-muted status-text">Select a .psd file to process</div>
                        <div class="progress mt-2 d-none slot-progress" style="height: 5px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-danger btn-sm remove-slot-btn" title="Remove">
                        <i class="bi bi-trash">&times;</i>
                    </button>
                </div>
            </div>
        `;

        const fileInput = slot.querySelector('.psd-file-input');
        const statusText = slot.querySelector('.status-text');
        const progressBar = slot.querySelector('.slot-progress');
        const removeBtn = slot.querySelector('.remove-slot-btn');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            updateSubmitButton();
            progressBar.classList.remove('d-none');
            const bar = progressBar.querySelector('.progress-bar');
            bar.style.width = '20%';
            statusText.innerText = `Processing ${file.name}...`;

            try {
                const buffer = await file.arrayBuffer();
                bar.style.width = '50%';
                const psd = agPsd.readPsd(buffer);

                const optimizedPsd = { ...psd };
                delete optimizedPsd.imageResources;
                delete optimizedPsd.linkedFiles;

                psdStructures[slotId] = optimizedPsd;

                bar.style.width = '100%';
                bar.classList.remove('progress-bar-animated');
                statusText.className = 'small text-success fw-bold';
                statusText.innerText = `${file.name} processed successfully.`;
                syncPsdData();
            } catch (err) {
                console.error(`Error processing ${file.name}:`, err);
                statusText.className = 'small text-danger';
                statusText.innerText = `Error: Failed to parse ${file.name}`;
                delete psdStructures[slotId];
                syncPsdData();
            }
            updateSubmitButton();
        });

        removeBtn.addEventListener('click', () => {
            slot.remove();
            delete psdStructures[slotId];
            syncPsdData();
            updateSubmitButton();
        });

        psdSlotsContainer.appendChild(slot);
        return slot;
    }

    function syncPsdData() {
        // Because Django gets files in order of appearance in DOM, 
        // we should sync the JSON array in the same DOM order.
        const results = [];
        const slots = psdSlotsContainer.querySelectorAll('.psd-slot');
        slots.forEach(slot => {
            const id = slot.id;
            const structure = psdStructures[id] || null;
            results.push({ structure: structure });
        });
        psdDataInput.value = JSON.stringify(results);
    }

    function updateSubmitButton() {
        const slots = psdSlotsContainer.querySelectorAll('.psd-slot');
        // Disable if no slots or any slot is missing a processed structure
        let allProcessed = slots.length > 0;
        slots.forEach(slot => {
            if (!psdStructures[slot.id]) {
                allProcessed = false;
            }
        });
        // We also want to disable if any slot is currently processing? 
        // (Handled by the fact that if it's processing, psdStructures[id] isn't set yet)
        submitBtn.disabled = !allProcessed;
    }

    addPsdBtn.addEventListener('click', () => {
        createPsdSlot();
        updateSubmitButton();
    });

    // Initialize with one slot
    createPsdSlot();
    updateSubmitButton();
</script>

<style>
    .border-dashed {
        border-style: dashed !important;
        border-width: 2px !important;
    }

    .psd-slot {
        transition: all 0.2s;
    }

    .psd-slot:hover {
        border-color: #0d6efd !important;
        background-color: #f8f9fa;
    }

    .remove-slot-btn {
        font-size: 1.2rem;
        padding: 0 0.5rem;
        line-height: 1;
    }
</style>
{% endblock %}
