{% extends 'dashboard/base.html' %}

{% block title %}Upload Product - Admin Panel{% endblock %}
{% block header %}Upload New Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Premium T-Shirt Mockup" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="thumbnail" class="form-label">Thumbnail Image</label>
                            <input type="file" class="form-control" id="thumbnail" name="thumbnail" accept="image/*" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="Enter product details..." required></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="psd_files" class="form-label">PSD Files (Select one or many)</label>
                        <div class="upload-area border border-dashed rounded p-4 text-center bg-light" id="drop-zone">
                            <input type="file" class="form-control" id="psd_files" name="psd_files" multiple required>
                            <div class="mt-2 text-muted small" id="status-text">You can upload multiple .psd files at once.</div>
                            <div class="progress mt-3 d-none" id="processing-progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Hidden input to store processed JSON data -->
                    <input type="hidden" name="psd_data" id="psd_data">

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4" id="submit-btn">Upload Product</button>
                        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ag-psd library -->
<script src="https://cdn.jsdelivr.net/npm/ag-psd/dist/bundle.js"></script>

<script>
    const fileInput = document.getElementById('psd_files');
    const psdDataInput = document.getElementById('psd_data');
    const statusText = document.getElementById('status-text');
    const progressBar = document.getElementById('processing-progress');
    const submitBtn = document.getElementById('submit-btn');

    fileInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        submitBtn.disabled = true;
        progressBar.classList.remove('d-none');
        const results = [];

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            statusText.innerText = `Processing ${file.name} (${i + 1}/${files.length})...`;
            const percent = ((i) / files.length) * 100;
            progressBar.querySelector('.progress-bar').style.width = `${percent}%`;

            try {
                const buffer = await file.arrayBuffer();
                // ag-psd exports to global 'agPsd' in bundle
                const psd = agPsd.readPsd(buffer);
                
                // Clean up the object to remove non-serializable parts if any
                // (ag-psd structure is generally serializable)
                results.push({
                    filename: file.name,
                    structure: psd
                });
            } catch (err) {
                console.error(`Error processing ${file.name}:`, err);
                results.push({
                    filename: file.name,
                    error: "Failed to parse PSD"
                });
            }
        }

        psdDataInput.value = JSON.stringify(results);
        statusText.innerText = `Processed ${files.length} file(s) successfully.`;
        progressBar.querySelector('.progress-bar').style.width = `100%`;
        progressBar.querySelector('.progress-bar').classList.remove('progress-bar-animated');
        submitBtn.disabled = false;
    });
</script>

<style>
    .upload-area {
        border: 2px dashed #dee2e6 !important;
        transition: border-color 0.2s;
    }
    .upload-area:hover {
        border-color: #0d6efd !important;
    }
</style>
{% endblock %}
