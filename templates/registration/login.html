<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AGHASSAN Admin</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 2rem;
            color: #1e293b;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-weight: 700;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .alert-modern {
            background: #fee2e2;
            border: none;
            color: #b91c1c;
            border-radius: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-logo">AGHASSAN</div>

        <div class="text-center mb-4">
            <h4 class="fw-bold m-0">Welcome Back</h4>
            <p class="text-muted small">Sign in to manage your inventory</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-modern p-3">
            <i class="bi bi-exclamation-circle me-1"></i> Invalid credentials.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" autofocus maxlength="150" required id="id_username"
                    class="form-control" placeholder="admin">
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" required id="id_password" class="form-control"
                    placeholder="••••••••">
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary">
                    Sign In <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </div>
        </form>

        <div class="mt-4 text-center">
            <p class="text-muted" style="font-size: 0.75rem;">
                &copy; 2026 AGHASSAN Mockup Systems
            </p>
        </div>
    </div>

</body>

</html>
